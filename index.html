<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>全球FM收音机</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="全球FM收音机">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" class="logo" aria-hidden="true"><path d="M4 7a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v7a4 4 0 0 1-4 4h-2.2l1.1 2.2a1 1 0 1 1-1.8.9L11.4 18H7a3 3 0 0 1-3-3V7zm3-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a2 2 0 0 0 2-2V7a1 1 0 0 0-1-1H7zM6 9h2v2H6V9zm3 0h2v2H9V9z" fill="currentColor"/></svg>
      <span class="title">全球FM收音机</span>
    </div>
    <nav class="topnav">
      <a class="navlink" href="/blog/">博客</a>
      <a class="navlink" href="/tools/pomodoro.html">番茄钟</a>
      <button id="installBtn" class="btn ghost" hidden>安装应用</button>
    </nav>
  </header>

  <main class="container">
    <section class="controls">
      <div class="field">
        <input id="searchInput" type="search" placeholder="搜索电台名称…" autocomplete="off">
      </div>
      <div class="row">
        <select id="countrySelect">
          <option value="">所有国家/地区</option>
        </select>
        <select id="languageSelect">
          <option value="">所有语言</option>
        </select>
        <select id="genreSelect">
          <option value="">所有分类</option>
        </select>
        <label style="display:flex;align-items:center;gap:6px;white-space:nowrap;">
          <input id="includeInsecure" type="checkbox">
          <span>包含非HTTPS</span>
        </label>
        <button id="searchBtn" class="btn primary">搜索</button>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="discover">发现</button>
        <button class="tab" data-tab="favorites">收藏</button>
        <button class="tab" data-tab="recent">最近</button>
      </div>
    </section>

    <section id="discover" class="panel active">
      <ul id="stationList" class="list"></ul>
      <div id="emptyDiscover" class="empty" hidden>没有找到电台，试试更少的筛选条件</div>
      <div id="resultInfo" class="empty" hidden></div>
      <div id="sentinel" class="load-more"></div>
    </section>

    <section id="favorites" class="panel">
      <ul id="favList" class="list"></ul>
      <div id="emptyFav" class="empty">还没有收藏的电台</div>
    </section>

    <section id="recent" class="panel">
      <ul id="recentList" class="list"></ul>
      <div id="emptyRecent" class="empty">最近播放为空</div>
    </section>
  </main>

  <footer class="player">
    <div class="now">
      <div class="meta">
        <div id="nowTitle" class="title">未播放</div>
        <div id="nowSub" class="subtitle"></div>
      </div>
    </div>
    <div class="controls-row">
      <button id="prevBtn" class="icon-btn" aria-label="上一电台">⏮</button>
      <button id="playBtn" class="icon-btn" aria-label="播放/暂停">
        <span id="playIcon">▶</span>
      </button>
      <button id="nextBtn" class="icon-btn" aria-label="下一电台">⏭</button>
      <button id="stopBtn" class="icon-btn" aria-label="停止">■</button>
      <button id="favBtn" class="icon-btn" aria-label="收藏">☆</button>
      <input id="volume" type="range" min="0" max="1" step="0.01" value="1" aria-label="音量">
    </div>
    <audio id="audio" preload="none" crossorigin="anonymous"></audio>
  </footer>

  <script src="/assets/js/app.js" type="module"></script>
</body>
</html>
