<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>博客 - 全球FM收音机</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" class="logo" aria-hidden="true"><path d="M4 7a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v7a4 4 0 0 1-4 4h-2.2l1.1 2.2a1 1 0 1 1-1.8.9L11.4 18H7a3 3 0 0 1-3-3V7zm3-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a2 2 0 0 0 2-2V7a1 1 0 0 0-1-1H7zM6 9h2v2H6V9zm3 0h2v2H9V9z" fill="currentColor"/></svg>
      <span class="title">博客</span>
    </div>
    <nav class="topnav">
      <a class="navlink" href="/blog/write.html">写博客</a>
      <a class="navlink" href="/tools/pomodoro.html">番茄钟</a>
      <a class="navlink" href="/">返回首页</a>
    </nav>
  </header>

  <main class="container">
    <section class="card card-pad">
      <div class="blog-head">
        <h1 class="blog-title">最新文章</h1>
        <span class="pill" id="countPill">0</span>
      </div>
      <div class="row" style="margin-top:12px">
        <input id="q" type="search" placeholder="搜索标题/摘要/标签…" autocomplete="off" style="flex:1 1 240px">
        <select id="tag">
          <option value="">全部标签</option>
        </select>
      </div>
    </section>

    <section style="margin-top:12px" class="post-list" id="list"></section>
    <div id="empty" class="empty" hidden>暂无文章</div>
    <div id="pager" class="load-more" hidden></div>
  </main>

  <script src="/assets/js/blog.js" type="module"></script>
</body>
</html>
