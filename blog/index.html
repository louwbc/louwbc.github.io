---
layout: default
title: "博客"
---

<section class="card card-pad">
  <h1 class="blog-title" style="margin:0">博客</h1>
  <p class="muted" style="margin-top:8px">文章按时间倒序展示。</p>
</section>

<section style="margin-top:12px">
  {% for post in site.posts %}
    <a class="card card-pad post-item" href="{{ post.url }}" style="display:block;margin-top:12px;text-decoration:none">
      <div class="title">{{ post.title }}</div>
      <div class="muted" style="margin-top:6px">
        {{ post.date | date: "%Y-%m-%d" }}{% if post.tags %} · {{ post.tags | join: " · " }}{% endif %}
      </div>
      {% if post.excerpt %}
        <p class="excerpt muted" style="margin-bottom:0">{{ post.excerpt | strip_html | strip_newlines }}</p>
      {% endif %}
    </a>
  {% endfor %}
</section>
