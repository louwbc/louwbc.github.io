---
layout: default
title: "博客"
---

<section class="card card-pad">
  <h1 class="hero-title" style="margin:0">博客</h1>
  <p class="muted" style="margin-top:8px">使用 Jekyll 的 `_posts/` 写文章，GitHub Pages 自动发布。</p>
</section>

<section class="post-list">
  {% for post in site.posts %}
    <a class="card card-pad post-item" href="{{ post.url | relative_url }}">
      <h3 class="post-title">{{ post.title }}</h3>
      <div class="post-meta">{{ post.date | date: "%Y-%m-%d" }}{% if post.tags %} · {{ post.tags | join: " · " }}{% endif %}</div>
      {% if post.excerpt %}
        <p class="post-excerpt">{{ post.excerpt }}</p>
      {% endif %}
    </a>
  {% endfor %}
</section>
