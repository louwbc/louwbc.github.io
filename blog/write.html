<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>写博客 - 全球FM收音机</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" class="logo" aria-hidden="true"><path d="M4 7a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v7a4 4 0 0 1-4 4h-2.2l1.1 2.2a1 1 0 1 1-1.8.9L11.4 18H7a3 3 0 0 1-3-3V7zm3-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a2 2 0 0 0 2-2V7a1 1 0 0 0-1-1H7zM6 9h2v2H6V9zm3 0h2v2H9V9z" fill="currentColor"/></svg>
      <span class="title">写博客</span>
    </div>
    <nav class="topnav">
      <a class="navlink" href="/blog/">文章列表</a>
      <a class="navlink" href="/tools/pomodoro.html">番茄钟</a>
      <a class="navlink" href="/">收音机</a>
    </nav>
  </header>

  <main class="container">
    <section class="card card-pad">
      <h1 class="blog-title">写作助手</h1>
      <p class="muted" style="margin-top:8px">输入内容后可实时预览，并生成文章文件与 <code>index.json</code> 条目。</p>
      <div class="field" style="margin-top:10px"><input id="w-title" type="text" placeholder="标题"></div>
      <div class="row">
        <input id="w-slug" type="text" placeholder="slug（自动生成，可修改）" style="flex:1 1 200px">
        <input id="w-date" type="date" style="flex:1 1 180px">
      </div>
      <div class="field" style="margin-top:10px"><input id="w-tags" type="text" placeholder="标签，逗号分隔，如：产品,更新"></div>
      <div class="field" style="margin-top:10px"><input id="w-excerpt" type="text" placeholder="摘要"></div>
      <div class="field" style="margin-top:10px">
        <textarea id="w-body" class="editor-area" placeholder="支持 Markdown：# 标题、## 二级标题、- 列表、**加粗**、[链接](https://...)"></textarea>
      </div>
      <div class="row">
        <button id="w-copy-json" class="btn primary">复制索引条目</button>
        <button id="w-copy-html" class="btn primary">复制正文HTML</button>
        <button id="w-download" class="btn primary">下载文章文件</button>
      </div>
      <pre id="w-out" class="codebox"></pre>
    </section>

    <section class="card" style="margin-top:12px">
      <div class="card-pad">
        <h2 class="blog-title">预览</h2>
        <div class="muted" id="w-meta"></div>
      </div>
      <article class="post-body" id="w-preview"></article>
    </section>
  </main>

  <script src="/assets/js/blog.js" type="module"></script>
</body>
</html>
