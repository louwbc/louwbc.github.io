<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ '/icons/icon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <svg viewBox="0 0 24 24" class="logo" aria-hidden="true"><path d="M4 7a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v7a4 4 0 0 1-4 4h-2.2l1.1 2.2a1 1 0 1 1-1.8.9L11.4 18H7a3 3 0 0 1-3-3V7zm3-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a2 2 0 0 0 2-2V7a1 1 0 0 0-1-1H7zM6 9h2v2H6V9zm3 0h2v2H9V9z" fill="currentColor"/></svg>
        <div class="brand-title">{{ site.title }}</div>
      </div>
      <nav class="nav">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/blog/' | relative_url }}">博客</a>
        <a href="{{ '/apps/pomodoro/' | relative_url }}">番茄钟</a>
        <a href="{{ '/apps/global-fm/' | relative_url }}">全球FM</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>
</body>
</html>
