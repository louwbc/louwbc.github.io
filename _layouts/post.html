---
layout: default
---

<section class="card">
  <div class="card-pad">
    <div class="muted">{{ page.date | date: "%Y-%m-%d" }}{% if page.tags %} · {{ page.tags | join: " · " }}{% endif %}</div>
    <h1 style="margin:8px 0 0">{{ page.title }}</h1>
  </div>
  <article class="post-body" style="padding:16px 16px 18px">
    {{ content }}
  </article>
</section>
