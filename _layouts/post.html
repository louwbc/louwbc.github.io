---
layout: default
---

<section class="card">
  <div class="card-pad">
    <h1 class="hero-title">{{ page.title }}</h1>
    <div class="post-meta">
      {{ page.date | date: "%Y-%m-%d" }}{% if page.tags %} · {{ page.tags | join: " · " }}{% endif %}
    </div>
    {% if page.excerpt %}
      <p class="post-excerpt">{{ page.excerpt }}</p>
    {% endif %}
  </div>
  <article class="card-pad prose">
    {{ content }}
  </article>
</section>
