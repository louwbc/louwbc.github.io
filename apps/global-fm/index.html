<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>全球FM</title>
  <link rel="icon" href="../../icons/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="../../assets/css/site.css">
  <link rel="stylesheet" href="./global-fm.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <svg viewBox="0 0 24 24" class="logo" aria-hidden="true"><path d="M4 7a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v7a4 4 0 0 1-4 4h-2.2l1.1 2.2a1 1 0 1 1-1.8.9L11.4 18H7a3 3 0 0 1-3-3V7zm3-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a2 2 0 0 0 2-2V7a1 1 0 0 0-1-1H7zM6 9h2v2H6V9zm3 0h2v2H9V9z" fill="currentColor"/></svg>
        <div class="brand-title">全球FM</div>
      </div>
      <nav class="nav">
        <a href="../../">首页</a>
        <a href="../../blog/">博客</a>
        <a href="../pomodoro/">番茄钟</a>
        <button class="btn" id="installBtn" hidden>安装</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card card-pad">
      <div class="row">
        <input id="q" class="input" type="search" placeholder="搜索电台名称…" autocomplete="off">
        <select id="lang" class="input">
          <option value="">所有语言</option>
        </select>
        <label class="check">
          <input id="insecure" type="checkbox">
          <span>包含非HTTPS</span>
        </label>
        <button class="btn primary" id="searchBtn">搜索</button>
      </div>
      <div class="row" style="margin-top:10px;justify-content:space-between;align-items:center">
        <div class="muted" id="info">准备就绪</div>
        <div class="row">
          <button class="btn" id="tabDiscover" data-tab="discover">发现</button>
          <button class="btn" id="tabFav" data-tab="favorites">收藏</button>
          <button class="btn" id="tabRecent" data-tab="recent">最近</button>
        </div>
      </div>
    </section>

    <section class="list" id="list" style="margin-top:12px"></section>
    <div class="muted" id="empty" style="margin-top:12px" hidden>没有结果</div>
    <div id="sentinel" style="height:1px"></div>
  </main>

  <footer class="player" id="player">
    <div class="now">
      <div class="now-title" id="nowTitle">未播放</div>
      <div class="now-sub muted" id="nowSub"></div>
    </div>
    <div class="controls">
      <button class="btn" id="prevBtn">上一首</button>
      <button class="btn primary" id="playBtn">播放</button>
      <button class="btn" id="nextBtn">下一首</button>
      <button class="btn" id="favBtn">收藏</button>
      <input class="vol" id="vol" type="range" min="0" max="1" step="0.01">
    </div>
    <audio id="audio" preload="none" crossorigin="anonymous"></audio>
  </footer>

  <script src="./global-fm.js" type="module"></script>
</body>
</html>
