<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>番茄钟</title>
  <link rel="icon" href="../../icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/css/site.css">
  <link rel="stylesheet" href="./pomodoro.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <svg viewBox="0 0 24 24" class="logo" aria-hidden="true"><path d="M4 7a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v7a4 4 0 0 1-4 4h-2.2l1.1 2.2a1 1 0 1 1-1.8.9L11.4 18H7a3 3 0 0 1-3-3V7zm3-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a2 2 0 0 0 2-2V7a1 1 0 0 0-1-1H7zM6 9h2v2H6V9zm3 0h2v2H9V9z" fill="currentColor"/></svg>
        <div class="brand-title">番茄钟</div>
      </div>
      <nav class="nav">
        <a href="../../">首页</a>
        <a href="../../blog/">博客</a>
        <a href="../global-fm/">全球FM</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card card-pad">
      <div class="row" style="align-items:center;justify-content:space-between">
        <h1 class="hero-title" style="margin:0">番茄工作法</h1>
        <span class="badge" id="stateBadge">未开始</span>
      </div>
      <div class="time" id="time">25:00</div>
      <div class="muted" id="sub" style="text-align:center;margin-top:6px">专注 25 分钟 · 休息 5 分钟 · 每 4 次专注长休息</div>
      <div class="row" style="justify-content:center;margin-top:12px">
        <button class="btn primary" id="startBtn">开始</button>
        <button class="btn" id="pauseBtn" disabled>暂停</button>
        <button class="btn" id="skipBtn">跳到下一段</button>
        <button class="btn" id="resetBtn">重置</button>
      </div>
    </section>

    <section class="card card-pad" style="margin-top:12px">
      <div class="row" style="align-items:center;justify-content:space-between">
        <h2 style="margin:0">设置</h2>
        <button class="btn primary" id="notifyBtn">开启提醒</button>
      </div>
      <div class="row" style="margin-top:12px">
        <label class="field">
          <span class="muted">专注(分钟)</span>
          <input id="workMin" type="number" min="1" max="180" inputmode="numeric">
        </label>
        <label class="field">
          <span class="muted">短休息(分钟)</span>
          <input id="shortMin" type="number" min="1" max="60" inputmode="numeric">
        </label>
        <label class="field">
          <span class="muted">长休息(分钟)</span>
          <input id="longMin" type="number" min="1" max="120" inputmode="numeric">
        </label>
        <label class="field">
          <span class="muted">每几次专注长休息</span>
          <input id="cycles" type="number" min="2" max="12" inputmode="numeric">
        </label>
      </div>
      <div class="row" style="margin-top:12px">
        <label class="toggle">
          <input id="sound" type="checkbox">
          <span>声音提醒</span>
        </label>
        <label class="toggle">
          <input id="vibrate" type="checkbox">
          <span>震动提醒</span>
        </label>
      </div>
      <div class="muted" id="hint" style="margin-top:10px"></div>
    </section>
  </main>

  <script src="./pomodoro.js" type="module"></script>
</body>
</html>
